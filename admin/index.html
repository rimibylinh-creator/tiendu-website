<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Tiên Du Kho Hàng</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { font-family: Inter, sans-serif; background: #f5f5f5; color: #252b42; font-size: 14px }

  /* ── Login ── */
  #loginWrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border-radius: 12px; padding: 40px; width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,.1);
  }
  .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px }
  .login-card p  { color: #737373; margin-bottom: 28px; font-size: 13px }
  .field { margin-bottom: 16px }
  .field label { display: block; font-weight: 500; margin-bottom: 6px }
  .field input {
    width: 100%; border: 1px solid #d2d2d2; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; outline: none;
  }
  .field input:focus { border-color: #fecd27 }
  #loginErr { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none }

  /* ── Admin shell ── */
  #adminWrap { display: none; min-height: 100vh }
  .topbar {
    background: #000; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-weight: 700; font-size: 16px }
  .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 13px }
  #userEmail { color: #fecd27 }

  .main { padding: 24px }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px }
  .tab {
    padding: 8px 20px; border-radius: 64px; border: 1px solid #d2d2d2;
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .tab.active { background: #fecd27; border-color: #fecd27; font-weight: 700 }

  /* ── Table ── */
  .tbl-wrap { background: #fff; border-radius: 12px; overflow: auto; box-shadow: 0 2px 8px rgba(0,0,0,.06) }
  table { width: 100%; border-collapse: collapse; min-width: 700px }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0f0f0 }
  th { background: #fafafa; font-size: 12px; font-weight: 600; color: #737373; text-transform: uppercase; letter-spacing: .5px }
  tr:last-child td { border-bottom: none }
  tr:hover td { background: #fffdf0 }

  /* ── Controls ── */
  select.ctl, input.ctl {
    border: 1px solid #d2d2d2; border-radius: 6px; padding: 6px 8px;
    font-size: 13px; background: #fff; outline: none;
  }
  select.ctl:focus, input.ctl:focus { border-color: #fecd27 }
  input.ctl[type=number] { width: 72px }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 64px; font-size: 12px; font-weight: 600;
  }
  .badge-in  { background: #dcfce7; color: #16a34a }
  .badge-out { background: #fee2e2; color: #dc2626 }
  .badge-pre { background: #fef9c3; color: #ca8a04 }

  .toggle {
    position: relative; display: inline-block; width: 36px; height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0 }
  .slider {
    position: absolute; inset: 0; background: #d2d2d2; border-radius: 20px; cursor: pointer; transition: .2s;
  }
  .slider:before {
    content: ''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  input:checked + .slider { background: #22c55e }
  input:checked + .slider:before { transform: translateX(16px) }

  .btn-save {
    background: #fecd27; border: none; border-radius: 6px; padding: 6px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .btn-save:hover { opacity: .85 }
  .btn-save:disabled { opacity: .4; cursor: default }
  .btn-save.saved { background: #dcfce7; color: #16a34a }

  .btn-logout {
    background: transparent; border: 1px solid rgba(255,255,255,.3);
    color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 13px;
    cursor: pointer; transition: background .15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.1) }

  .btn-primary {
    background: #fecd27; border: none; border-radius: 8px; padding: 10px 20px;
    font-size: 14px; font-weight: 700; cursor: pointer; width: 100%;
  }

  #toast {
    position: fixed; bottom: 24px; right: 24px; background: #252b42; color: #fff;
    padding: 12px 20px; border-radius: 8px; font-size: 13px;
    opacity: 0; transform: translateY(8px); transition: .2s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0) }

  .loading { color: #737373; padding: 24px; text-align: center }
  .name-col { font-weight: 500 }
  .name-col small { display: block; font-size: 11px; color: #737373; font-weight: 400 }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginWrap">
  <div class="login-card">
    <h1>Tiên Du Admin</h1>
    <p>Đăng nhập để quản lý kho hàng</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@ototiendu.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="loginErr">Email hoặc mật khẩu không đúng.</div>
    <button class="btn-primary" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<!-- ── ADMIN SHELL ── -->
<div id="adminWrap">
  <div class="topbar">
    <span class="topbar-title">⚙️ Tiên Du Admin</span>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="showTab('products', this)">Sản phẩm</button>
      <button class="tab" onclick="showTab('posts', this)">Bài viết</button>
    </div>

    <!-- Products tab -->
    <div id="tab-products">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Giá (₫)</th>
              <th>Trạng thái kho</th>
              <th>Số lượng</th>
              <th>Nổi bật</th>
              <th>Hiển thị</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productBody">
            <tr><td colspan="7" class="loading">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Posts tab -->
    <div id="tab-posts" style="display:none">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Bài viết</th>
              <th>Chuyên mục</th>
              <th>Ngày đăng</th>
              <th>Hiển thị</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="postBody">
            <tr><td colspan="5" class="loading">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://kdqjhlpvxrpijeoibgki.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcWpobHB2eHJwaWplb2liZ2tpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1Mjc0NDYsImV4cCI6MjA5ODEwMzQ0Nn0.cm4yaxaZZi6zIbEij8MEZqfHj_EbVhwlOK93szN-rMQ'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON)

// ── Auth ────────────────────────────────────────────────────────

async function doLogin() {
  const email = document.getElementById('email').value.trim()
  const pass  = document.getElementById('pass').value
  const err   = document.getElementById('loginErr')
  err.style.display = 'none'

  const { data, error } = await db.auth.signInWithPassword({ email, password: pass })
  if (error) { err.style.display = 'block'; return }
  showAdmin(data.user)
}

async function doLogout() {
  await db.auth.signOut()
  document.getElementById('adminWrap').style.display = 'none'
  document.getElementById('loginWrap').style.display = 'flex'
}

document.getElementById('pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

// Kiểm tra session còn hiệu lực
;(async () => {
  const { data: { session } } = await db.auth.getSession()
  if (session?.user) showAdmin(session.user)
})()

function showAdmin(user) {
  document.getElementById('loginWrap').style.display = 'none'
  document.getElementById('adminWrap').style.display = 'block'
  document.getElementById('userEmail').textContent = user.email
  loadProducts()
}

// ── Tabs ────────────────────────────────────────────────────────

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('tab-products').style.display = name === 'products' ? '' : 'none'
  document.getElementById('tab-posts').style.display    = name === 'posts'    ? '' : 'none'
  if (name === 'posts') loadPosts()
}

// ── Products ────────────────────────────────────────────────────

async function loadProducts() {
  const { data } = await db.from('products')
    .select('id, name, price, stock_status, stock_quantity, is_featured, is_published, brands(name), categories(name)')
    .order('created_at', { ascending: false })

  const tbody = document.getElementById('productBody')
  if (!data?.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading">Chưa có sản phẩm</td></tr>'
    return
  }

  tbody.innerHTML = data.map(p => `
    <tr>
      <td class="name-col">
        ${p.name}
        <small>${p.brands?.name || ''} · ${p.categories?.name || ''}</small>
      </td>
      <td>
        <input class="ctl" type="number" value="${p.price}" step="1000"
          onchange="markDirty('${p.id}')" id="price-${p.id}" style="width:110px">
      </td>
      <td>
        <select class="ctl" onchange="markDirty('${p.id}')" id="status-${p.id}">
          <option value="in_stock"     ${p.stock_status==='in_stock'     ? 'selected':''}>✅ Còn hàng</option>
          <option value="out_of_stock" ${p.stock_status==='out_of_stock' ? 'selected':''}>❌ Hết hàng</option>
          <option value="preorder"     ${p.stock_status==='preorder'     ? 'selected':''}>⏳ Đặt trước</option>
        </select>
      </td>
      <td>
        <input class="ctl" type="number" min="0" value="${p.stock_quantity ?? 0}"
          onchange="markDirty('${p.id}')" id="qty-${p.id}">
      </td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.is_featured ? 'checked':''}
            onchange="markDirty('${p.id}')" id="feat-${p.id}">
          <span class="slider"></span>
        </label>
      </td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.is_published ? 'checked':''}
            onchange="markDirty('${p.id}')" id="pub-${p.id}">
          <span class="slider"></span>
        </label>
      </td>
      <td>
        <button class="btn-save" id="save-${p.id}" disabled onclick="saveProduct('${p.id}')">Lưu</button>
      </td>
    </tr>
  `).join('')
}

function markDirty(id) {
  const btn = document.getElementById('save-' + id)
  btn.disabled = false
  btn.textContent = 'Lưu'
  btn.className = 'btn-save'
}

async function saveProduct(id) {
  const btn = document.getElementById('save-' + id)
  btn.disabled = true; btn.textContent = '...'

  const { error } = await db.from('products').update({
    price:          parseInt(document.getElementById('price-'  + id).value),
    stock_status:   document.getElementById('status-' + id).value,
    stock_quantity: parseInt(document.getElementById('qty-'    + id).value),
    is_featured:    document.getElementById('feat-'   + id).checked,
    is_published:   document.getElementById('pub-'    + id).checked,
  }).eq('id', id)

  if (error) {
    btn.disabled = false; btn.textContent = 'Lỗi!'
    showToast('❌ ' + error.message)
  } else {
    btn.textContent = '✓ Đã lưu'; btn.className = 'btn-save saved'
    showToast('✅ Đã cập nhật!')
  }
}

// ── Posts ───────────────────────────────────────────────────────

async function loadPosts() {
  const { data } = await db.from('posts')
    .select('id, title, is_published, published_at, post_categories(name)')
    .order('published_at', { ascending: false })

  const tbody = document.getElementById('postBody')
  if (!data?.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="loading">Chưa có bài viết</td></tr>'
    return
  }

  tbody.innerHTML = data.map(p => {
    const d = new Date(p.published_at)
    const date = d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear()
    return `
    <tr>
      <td class="name-col" style="max-width:380px">${p.title}</td>
      <td><span class="badge badge-in">${p.post_categories?.name || '—'}</span></td>
      <td>${date}</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.is_published ? 'checked':''}
            onchange="markPostDirty('${p.id}')" id="ppub-${p.id}">
          <span class="slider"></span>
        </label>
      </td>
      <td>
        <button class="btn-save" id="psave-${p.id}" disabled onclick="savePost('${p.id}')">Lưu</button>
      </td>
    </tr>`
  }).join('')
}

function markPostDirty(id) {
  const btn = document.getElementById('psave-' + id)
  btn.disabled = false; btn.textContent = 'Lưu'; btn.className = 'btn-save'
}

async function savePost(id) {
  const btn = document.getElementById('psave-' + id)
  btn.disabled = true; btn.textContent = '...'

  const { error } = await db.from('posts').update({
    is_published: document.getElementById('ppub-' + id).checked,
  }).eq('id', id)

  if (error) {
    btn.disabled = false; btn.textContent = 'Lỗi!'
    showToast('❌ ' + error.message)
  } else {
    btn.textContent = '✓ Đã lưu'; btn.className = 'btn-save saved'
    showToast('✅ Đã cập nhật!')
  }
}

// ── Toast ───────────────────────────────────────────────────────

let toastTimer
function showToast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500)
}
</script>
</body>
</html>
