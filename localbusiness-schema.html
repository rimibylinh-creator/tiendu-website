<!--
  SỬA LOCALBUSINESS SCHEMA — đồng bộ với Google Business Profile thật
  =====================================================================
  Schema hiện tại trên index.html có 2 vấn đề:

  1. "geo" SAI ~2km so với Place thật:
     - Đang ghi:  lat 12.2432, lng 109.1900
     - Đúng:      lat 12.224536, lng 109.1816264
     (lấy từ link Google Maps Place thật bạn đã xác nhận)

  2. Thiếu "hasMap" và thiếu link Maps trong "sameAs"
     → khiến Google không tự liên kết được website với chính
       Business Profile bạn đã tạo, dù 2 thứ nói về cùng 1 cửa hàng.

  CÁCH ÁP DỤNG: tìm đúng khối JSON-LD hiện có trong <head> của
  index.html (loại "LocalBusiness"/"AutoPartsStore"), thay 3 phần
  được đánh dấu ⚠️ dưới đây, giữ nguyên các field còn lại.
-->

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["LocalBusiness", "AutoPartsStore"],
  "name": "Tiên Du Phụ Tùng Ô Tô",
  "url": "https://ototiendu.com",
  "telephone": "+84946915111",
  "email": "tienduoto@gmail.com",
  "description": "Cửa hàng phụ tùng ô tô bán sỉ và lẻ tại Nha Trang, Khánh Hoà. Chuyên cung cấp phụ tùng chính hãng Toyota, Honda, Mazda, Mitsubishi, Hyundai, Ford và nhiều hãng khác.",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "37 Nguyễn Văn Hưởng, KDT VCN Phước Long",
    "addressLocality": "Nha Trang",
    "addressRegion": "Khánh Hoà",
    "postalCode": "650000",
    "addressCountry": "VN"
  },

  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 12.224536,
    "longitude": 109.1816264
  },

  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
      "opens": "07:30",
      "closes": "17:30"
    }
  ],
  "priceRange": "₫₫",
  "currenciesAccepted": "VND",
  "paymentAccepted": "Cash, Bank Transfer",
  "areaServed": {
    "@type": "State",
    "name": "Khánh Hoà"
  },

  "sameAs": [
    "https://zalo.me/0946915111",
    "https://www.facebook.com/ototiendunhatrang",
    "https://www.google.com/maps?cid=11722893229670589700"
  ],

  "hasMap": "https://www.google.com/maps?cid=11722893229670589700",

  "image": "https://ototiendu.com/assets/nav-logo.png"
}
</script>

<!--
  GHI CHÚ:
  - "hasMap" và mục cuối trong "sameAs" dùng chung 1 URL dạng CID
    (Customer ID), được suy ra trực tiếp từ Place ID thật trong link
    Google Maps bạn đã gửi. Đây là cách ổn định nhất để trỏ về đúng
    Place mà không cần Google Places API.
  - Sau khi cập nhật, nên dùng Google Rich Results Test
    (search.google.com/test/rich-results) để xác nhận không lỗi
    cú pháp trước khi publish.
-->
